spring:
  application:
    name: currency-rate-gif-selection-app-test

  liquibase:
    enabled: true
    change-log: classpath:/db/changelog/changelog-master.yml

  jpa:
    hibernate.ddl-auto: none
    show-sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect

# Эти секции необходимы для Feign-клиентов
external-giphy:
  api-key: test-giphy-key-12345  # Любое тестовое значение
  url: https://api.giphy.com/v1/gifs/search

external-exchangerate:
  url: https://v6.exchangerate-api.com/v6/test-api-key-12345/latest  # Явно указываем URL без placeholder
#------------------------------------------

test-external-giphy:
  api-key: test-giphy-key
  search-word:
    positive-rate: rich
    negative-rate: broke

test-external-exchangerate:
  base-currency: USD
  target-currency: RUB
  expected-rate: 97.5

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql: TRACE