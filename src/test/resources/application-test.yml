spring:
  application:
    name: currency-rate-gif-selection-app-test

  liquibase:
    enabled: true
    change-log: classpath:/db/changelog/changelog-master.yml

  jpa:
    hibernate.ddl-auto: none
    show-sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect

test-external-giphy:
  api-key: test-giphy-key
  search-word:
    positive-rate: rich
    negative-rate: broke

test-external-exchangerate:
  base-currency: USD
  target-currency: RUB
  expected-rate: 97.5

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql: TRACE